<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Complaint Form</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

    <div class="form-container">
        <div class="form-header">
            <h2>College Complaint Portal</h2>
            <p>Please fill out the form below to submit your grievance.</p>
        </div>

        <form id="complaintForm" action="/submit" method="POST">
            <!-- Name Field -->
            <div class="input-group">
                <label for="studentName">Full Name</label>
                <input type="text" id="studentName" name="name" placeholder="Enter your full name" required>
            </div>

            <!-- Enrollment Number Field -->
            <div class="input-group">
                <label for="enrollmentNo">Enrollment Number</label>
                <input type="text" id="enrollmentNo" name="enrollment_no" placeholder="e.g. EN12345678" required>
            </div>

            <!-- Email Field -->
            <div class="input-group">
                <label for="studentEmail">Email Address</label>
                <input type="email" id="studentEmail" name="email" placeholder="e.g. student@college.edu" required>
            </div>

            <!-- Academic Year Field (Kept to prevent backend issues) -->
            <div class="input-group">
                <label for="year">Academic Year</label>
                <select id="year" name="year" required>
                    <option value="" disabled selected>Select Year</option>
                    <option value="1">First Year</option>
                    <option value="2">Second Year</option>
                    <option value="3">Third Year</option>
                    <option value="4">Fourth Year</option>
                    <option value="Postgrad">Postgraduate</option>
                </select>
            </div>

            <!-- Complaint Field -->
            <div class="input-group">
                <label for="complaint">Complaint Description</label>
                <textarea id="complaint" name="complaint" rows="5" placeholder="Describe the issue you are facing..."
                    required></textarea>
            </div>

            <!-- Submit Button -->
            <button type="submit" class="submit-btn" id="submitBtn">
                <span>Submit Complaint</span>
                <div class="loader"></div>
            </button>
        </form>
    </div>

    <script>
        document.getElementById('complaintForm').addEventListener('submit', function () {
            const btn = document.getElementById('submitBtn');
            btn.classList.add('loading');
            btn.querySelector('span').innerText = 'Processing...';
        });
    </script>
</body>

</html>
